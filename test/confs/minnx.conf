# minnx example configuration
#
# Each line defines a process: name = command
# The command runs in a tmux window with auto-restart on crash.
#
# Options:
#   logs       = path      log directory (default: logs)
#   sleep      = seconds   delay between restart attempts (default: 1)
#   attempts   = number    max restart attempts, 0 = unlimited (default: 0)
#   on-error   = command   run on crash
#   on-restart = command   run before restart
#
# Usage:
#   minnx -c test/confs/minnx.conf start
#   minnx -c test/confs/minnx.conf
#   minnx -c test/confs/minnx.conf chat reviewer
#   minnx -c test/confs/minnx.conf stop

logs = test/logs

reviewer = pi "Begin review" --no-session
